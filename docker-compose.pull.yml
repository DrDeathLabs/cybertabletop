# CyberTabletop - pull-based self-hosted stack
# Uses prebuilt images from GitHub Container Registry instead of local builds.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cybertabletop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cybertabletop}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cybertabletop}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis} --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-changeme_redis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    image: ${CYBERTABLETOP_IMAGE_REGISTRY:-ghcr.io/drdeathlabs}/cybertabletop-backend:${CYBERTABLETOP_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-cybertabletop}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cybertabletop}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      AI_PROVIDER: ${AI_PROVIDER:-scripted}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-6}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REQUIRE_INVITE: ${REQUIRE_INVITE:-true}
      INVITE_CODE: ${INVITE_CODE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - host-bridge
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${CYBERTABLETOP_IMAGE_REGISTRY:-ghcr.io/drdeathlabs}/cybertabletop-frontend:${CYBERTABLETOP_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:80/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: ${CYBERTABLETOP_IMAGE_REGISTRY:-ghcr.io/drdeathlabs}/cybertabletop-nginx:${CYBERTABLETOP_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - '${HTTP_BIND:-127.0.0.1}:${HTTP_PORT:-80}:80'
      - '${HTTPS_BIND:-127.0.0.1}:${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
  host-bridge:
    driver: bridge

# CyberTabletop — Local Development / Self-Hosted Stack
# All services run in a private network; only nginx is exposed externally
# NIST SP 800-53 Rev 5: SC-7 (Boundary Protection)

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cybertabletop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cybertabletop}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cybertabletop}']
      interval: 10s
      timeout: 5s
      retries: 5
    # No external port — only reachable inside internal network (NIST SC-7)

  # ── Redis (Socket.io session adapter, future caching) ─────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis} --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-changeme_redis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      # Expanded from .env at runtime. Keep POSTGRES_PASSWORD secret.
      # Use an alphanumeric password, or URL-encode special characters.
      DATABASE_URL: postgresql://${POSTGRES_USER:-cybertabletop}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cybertabletop}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      AI_PROVIDER: ${AI_PROVIDER:-scripted}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-6}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REQUIRE_INVITE: ${REQUIRE_INVITE:-true}
      INVITE_CODE: ${INVITE_CODE:-}
    # host.docker.internal resolves to the Docker host on Docker Desktop.
    # host-gateway enables the same pattern on modern Linux Docker engines.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - host-bridge  # non-internal bridge so the backend can reach host services (Ollama)
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Vite build served by Nginx in container) ──────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:80/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  # Only container exposed to host — enforces security boundary (NIST SC-7)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - '${HTTP_BIND:-127.0.0.1}:${HTTP_PORT:-80}:80'
      - '${HTTPS_BIND:-127.0.0.1}:${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true    # No direct internet access for internal services (NIST SC-7)
  external:
    driver: bridge    # Only nginx bridges to external
  host-bridge:
    driver: bridge    # Non-isolated bridge; backend uses this to reach host services (e.g. Ollama)

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=moderate

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=moderate

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      REDIS_PASSWORD: ci-redis-password
      JWT_SECRET: ci-jwt-secret-ci-jwt-secret-ci-jwt-secret-ci-jwt-secret
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret-ci-refresh-secret
      SESSION_SECRET: ci-session-secret
      INVITE_CODE: ci-invite-code
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -p cybertabletop-ci config --no-interpolate

      - name: Validate pull-based compose file
        run: docker compose -p cybertabletop-ci -f docker-compose.pull.yml config --no-interpolate

      - name: Build containers
        run: docker compose -p cybertabletop-ci build backend frontend nginx

  installer-syntax:
    name: Installer Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell installer syntax
        run: bash -n install.sh

      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path install.ps1), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error "line $($_.Extent.StartLineNumber): $($_.Message)" }
            exit 1
          }
